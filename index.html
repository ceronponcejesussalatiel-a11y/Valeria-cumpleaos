<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Feliz Cumpleaños! 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rosa: #ff6b9d;
    --lila: #c77dff;
    --dorado: #ffd700;
    --crema: #fff9f0;
    --texto: #3d2c4e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a0533 0%, #2d0b5e 40%, #0f1a3e 100%);
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 30px 20px;
    overflow-x: hidden;
  }

  /* ESTRELLAS DE FONDO */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to   { opacity: 0.9; transform: scale(1.2); }
  }

  /* TIRAS / STREAMERS CAYENDO */
  .streamer {
    position: fixed;
    top: -60px;
    pointer-events: none;
    z-index: 1;
    animation: caerTira linear infinite;
    transform-origin: center top;
    border-radius: 3px;
  }
  @keyframes caerTira {
    0%   { transform: translateY(0) rotate(var(--rot0)) scaleX(1);   opacity: 0.9; }
    25%  { transform: translateY(25vh) rotate(var(--rot1)) scaleX(0.6); }
    50%  { transform: translateY(50vh) rotate(var(--rot2)) scaleX(1.1); }
    75%  { transform: translateY(75vh) rotate(var(--rot3)) scaleX(0.7); }
    100% { transform: translateY(115vh) rotate(var(--rot4)) scaleX(1);  opacity: 0; }
  }

  /* CÍRCULOS PASTEL PEQUEÑOS */
  .pastel-dot {
    position: fixed;
    top: -20px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    animation: caerDot linear infinite;
  }
  @keyframes caerDot {
    0%   { transform: translateY(0) translateX(0) scale(1);    opacity: 0.8; }
    30%  { transform: translateY(30vh) translateX(var(--dx1)) scale(0.9); }
    60%  { transform: translateY(60vh) translateX(var(--dx2)) scale(1.1); }
    100% { transform: translateY(115vh) translateX(var(--dx3)) scale(0.8); opacity: 0; }
  }

  /* TARJETA PRINCIPAL */
  .card {
    position: relative;
    z-index: 10;
    background: linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 30px;
    padding: 40px 35px;
    max-width: 700px;
    width: 100%;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    text-align: center;
    animation: aparecer 1s ease-out forwards;
  }
  @keyframes aparecer {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* BORDE FIJO SIN ANIMACIÓN */
  .card::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    background: linear-gradient(45deg, #f7c5d5, #e8b4e8, #fce4a0, #b8d4f0);
    border-radius: 32px;
    z-index: -1;
  }

  .emoji-top {
    font-size: 3.5rem;
    animation: bounce 1.5s ease-in-out infinite;
    display: block;
    margin-bottom: 10px;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-12px); }
  }

  h1 {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2.4rem, 6vw, 3.8rem);
    background: linear-gradient(90deg, #ff6b9d, #ffd700, #c77dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .nombre-display {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--dorado);
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
    margin-bottom: 20px;
    min-height: 2.5rem;
  }

  .mensaje {
    color: rgba(255,255,255,0.85);
    font-size: 1.05rem;
    line-height: 1.8;
    margin-bottom: 30px;
    font-weight: 300;
  }

  /* INPUT DE NOMBRE */
  .seccion-config {
    background: rgba(255,255,255,0.07);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 25px;
  }
  .seccion-config label {
    color: rgba(255,255,255,0.7);
    font-size: 0.85rem;
    display: block;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .input-nombre {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 12px 18px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    width: 100%;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    text-align: center;
  }
  .input-nombre::placeholder { color: rgba(255,255,255,0.35); }
  .input-nombre:focus {
    border-color: var(--rosa);
    box-shadow: 0 0 15px rgba(255,107,157,0.3);
  }

  /* GALERÍA DE FOTOS */
  .galeria-titulo {
    color: rgba(255,255,255,0.7);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .galeria {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
    min-height: 30px;
  }

  .foto-item {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    aspect-ratio: 1;
    border: 2px solid rgba(255,255,255,0.15);
    animation: fotoEntrar 0.5s ease-out forwards;
    cursor: pointer;
    transition: transform 0.3s;
  }
  .foto-item:hover { transform: scale(1.04); }
  @keyframes fotoEntrar {
    from { opacity: 0; transform: scale(0.8) rotate(-3deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  .foto-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .foto-item .quitar {
    position: absolute;
    top: 5px; right: 5px;
    background: rgba(0,0,0,0.6);
    border: none; border-radius: 50%;
    color: white; width: 24px; height: 24px;
    cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
  }
  .foto-item:hover .quitar { opacity: 1; }

  /* ZONA DE SUBIDA */
  .zona-upload {
    border: 2px dashed rgba(199,125,255,0.5);
    border-radius: 18px;
    padding: 25px;
    cursor: pointer;
    transition: all 0.3s;
    background: rgba(199,125,255,0.05);
    margin-bottom: 20px;
  }
  .zona-upload:hover, .zona-upload.drag-over {
    border-color: var(--rosa);
    background: rgba(255,107,157,0.1);
    transform: scale(1.01);
  }
  .zona-upload .icono { font-size: 2.2rem; margin-bottom: 8px; }
  .zona-upload p { color: rgba(255,255,255,0.6); font-size: 0.9rem; }
  .zona-upload span { color: var(--rosa); font-weight: 600; }
  #inputFotos { display: none; }

  /* BOTÓN COMPARTIR */
  .btn-compartir {
    background: linear-gradient(135deg, var(--rosa), var(--lila));
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    letter-spacing: 0.5px;
    box-shadow: 0 8px 25px rgba(255,107,157,0.4);
  }
  .btn-compartir:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 35px rgba(255,107,157,0.5);
  }
  .btn-compartir:active { transform: translateY(0); }

  /* MODO PRESENTACIÓN */
  .modo-presentacion {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modo-presentacion.activo { display: flex; }
  .foto-grande {
    max-width: 90vw;
    max-height: 75vh;
    border-radius: 20px;
    object-fit: contain;
    box-shadow: 0 0 60px rgba(255,107,157,0.4);
    animation: zoomIn 0.4s ease-out;
  }
  @keyframes zoomIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
  .nav-presentacion {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    align-items: center;
  }
  .nav-presentacion button {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 50%;
    width: 48px; height: 48px;
    color: white; font-size: 1.3rem;
    cursor: pointer; transition: background 0.2s;
  }
  .nav-presentacion button:hover { background: var(--rosa); }
  .cerrar-presentacion {
    position: absolute;
    top: 20px; right: 25px;
    background: none; border: none;
    color: white; font-size: 2rem;
    cursor: pointer; opacity: 0.7;
    transition: opacity 0.2s;
  }
  .cerrar-presentacion:hover { opacity: 1; }

  .separador {
    width: 60px; height: 3px;
    background: linear-gradient(90deg, var(--rosa), var(--lila));
    border-radius: 3px;
    margin: 20px auto;
  }

  .footer-card {
    margin-top: 25px;
    color: rgba(255,255,255,0.3);
    font-size: 0.78rem;
  }
</style>
</head>
<body>

<!-- Estrellas -->
<div class="stars" id="stars"></div>

<!-- Confeti -->
<div id="confeti"></div>

<!-- Modo presentación -->
<div class="modo-presentacion" id="modoPresentacion">
  <button class="cerrar-presentacion" onclick="cerrarPresentacion()">✕</button>
  <img src="" class="foto-grande" id="fotoGrande" alt="foto">
  <div class="nav-presentacion">
    <button onclick="navFoto(-1)">‹</button>
    <span id="contadorFotos" style="color:white; font-family:'Nunito',sans-serif; font-size:0.9rem; opacity:0.7">1/1</span>
    <button onclick="navFoto(1)">›</button>
  </div>
</div>

<!-- TARJETA -->
<div class="card">
  <span class="emoji-top">🎂</span>

  <h1>¡Feliz Cumpleaños!</h1>
  <div class="nombre-display" id="nombreDisplay">Valeria</div>

  <p class="mensaje">
    Hoy es un día muy especial porque tú eres especial. 🌸<br>
    Que este año esté lleno de momentos hermosos,<br>
    risas infinitas y todo lo que mereces. 💫
  </p>

  <div class="separador"></div>

    🎉 Ver presentación de fotos

  <p class="footer-card">Hecho con 💜 · Solo abre este archivo en tu navegador</p>
</div>

<script>
  // ── ESTRELLAS ──────────────────────────────────────────────
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      --dur:${(Math.random()*3+2).toFixed(1)}s;
      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  // ── TIRAS (STREAMERS) Y PUNTOS PASTEL CAYENDO ─────────────
  const pasteles = [
    '#f7c5d5', // rosa suave
    '#fce4a0', // amarillo pastel
    '#b8d4f0', // azul bebé
    '#c9f0c8', // verde menta
    '#e8b4e8', // lila suave
    '#ffd6b0', // melocotón
    '#d4f0f0', // aqua pastel
    '#f9d5e5', // rosa pálido
  ];

  const confEl = document.getElementById('confeti');

  // Tiras largas
  for (let i = 0; i < 35; i++) {
    const t = document.createElement('div');
    t.className = 'streamer';
    const ancho = Math.random() * 6 + 3;
    const largo = Math.random() * 40 + 25;
    const color = pasteles[Math.floor(Math.random() * pasteles.length)];
    const r = () => (Math.random() * 360).toFixed(0) + 'deg';
    t.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${ancho}px;
      height: ${largo}px;
      background: ${color};
      --rot0: ${r()}; --rot1: ${r()}; --rot2: ${r()}; --rot3: ${r()}; --rot4: ${r()};
      animation-duration: ${(Math.random() * 4 + 4).toFixed(1)}s;
      animation-delay: ${(Math.random() * 6).toFixed(1)}s;
      opacity: 0.85;
    `;
    confEl.appendChild(t);
  }

  // Puntos pastel redondos
  for (let i = 0; i < 30; i++) {
    const d = document.createElement('div');
    d.className = 'pastel-dot';
    const size = Math.random() * 10 + 5;
    const color = pasteles[Math.floor(Math.random() * pasteles.length)];
    const dx = () => ((Math.random() - 0.5) * 80).toFixed(0) + 'px';
    d.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${size}px;
      height: ${size}px;
      background: ${color};
      --dx1: ${dx()}; --dx2: ${dx()}; --dx3: ${dx()};
      animation-duration: ${(Math.random() * 5 + 4).toFixed(1)}s;
      animation-delay: ${(Math.random() * 7).toFixed(1)}s;
    `;
    confEl.appendChild(d);
  }

  // ── NOMBRE ─────────────────────────────────────────────────
  function actualizarNombre(val) {
    const d = document.getElementById('nombreDisplay');
    d.textContent = val.trim() ? val : '✨';

  function cargarFotos(files) {
    Array.from(files).forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = e => {
        fotos.push(e.target.result);
        renderGaleria();
      };
      reader.readAsDataURL(file);
    });
  }

  function renderGaleria() {
    const g = document.getElementById('galeria');
    g.innerHTML = '';
    fotos.forEach((src, i) => {
      const div = document.createElement('div');
      div.className = 'foto-item';
      div.innerHTML = `
        <img src="${src}" alt="foto ${i+1}" onclick="verFoto(${i})">
        <button class="quitar" onclick="quitarFoto(event,${i})">✕</button>
      `;
      g.appendChild(div);
    });
  }

  function quitarFoto(e, i) {
    e.stopPropagation();
    fotos.splice(i, 1);
    renderGaleria();
  }

  // ── DRAG & DROP ───────────────────────────────────────────
  function dragOver(e) {
    e.preventDefault();
    document.getElementById('zonaUpload').classList.add('drag-over');
  }
  function dragLeave() {
    document.getElementById('zonaUpload').classList.remove('drag-over');
  }
  function dropFotos(e) {
    e.preventDefault();
    dragLeave();
    cargarFotos(e.dataTransfer.files);
  }

  // ── PRESENTACIÓN ──────────────────────────────────────────
  let fotoActual = 0;

  function verPresentacion() {
    if (fotos.length === 0) {
      alert('¡Agrega al menos una foto primero! 📸');
      return;
    }
    fotoActual = 0;
    mostrarFoto(fotoActual);
    document.getElementById('modoPresentacion').classList.add('activo');
  }

  function verFoto(i) {
    fotoActual = i;
    mostrarFoto(fotoActual);
    document.getElementById('modoPresentacion').classList.add('activo');
  }

  function mostrarFoto(i) {
    document.getElementById('fotoGrande').src = fotos[i];
    document.getElementById('contadorFotos').textContent = `${i+1} / ${fotos.length}`;
  }

  function navFoto(dir) {
    fotoActual = (fotoActual + dir + fotos.length) % fotos.length;
    const img = document.getElementById('fotoGrande');
    img.style.animation = 'none';
    void img.offsetWidth;
    img.style.animation = 'zoomIn 0.35s ease-out';
    mostrarFoto(fotoActual);
  }

  function cerrarPresentacion() {
    document.getElementById('modoPresentacion').classList.remove('activo');
  }

  // Cerrar con ESC o flecha
  document.addEventListener('keydown', e => {
    if (!document.getElementById('modoPresentacion').classList.contains('activo')) return;
    if (e.key === 'Escape') cerrarPresentacion();
    if (e.key === 'ArrowLeft') navFoto(-1);
    if (e.key === 'ArrowRight') navFoto(1);
  });
</script>
